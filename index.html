<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="完全無料のIQテスト。5分でできる20問の診断で、結果をSNSにシェアできます。">
  <title>IQテスト | 5分でできる完全無料IQ診断</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9846065898219094"
     crossorigin="anonymous"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="top-band" aria-label="IQテスト">
      <div class="brand-mark" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="intro">
        <p class="eyebrow">完全無料・登録不要</p>
        <h1>IQテスト 5分でできる完全無料IQ診断</h1>
        <p class="lead">図形、数列、言語推理を20問。すぐに診断して、結果をSNSでシェアできます。</p>
      </div>
      <div class="stats" aria-label="テスト概要">
        <div><strong>20</strong><span>問</span></div>
        <div><strong>5</strong><span>分目安</span></div>
      </div>
    </section>

    <section class="test-panel" aria-live="polite">
      <div id="startView" class="start-view">
        <div class="sample-grid" aria-hidden="true">
          <div class="tile circle"></div>
          <div class="tile bars"></div>
          <div class="tile diamond"></div>
          <div class="tile dots"></div>
        </div>
        <div class="start-copy">
          <h2>直感と集中力で、今の思考タイプをチェック</h2>
          <p>制限時間はありません。迷ったら一番しっくりくる答えを選んでください。</p>
          <button id="startButton" class="primary-button" type="button">診断をはじめる</button>
        </div>
      </div>

      <div id="quizView" class="quiz-view hidden">
        <div class="progress-row">
          <span id="questionCount">1 / 20</span>
          <div class="progress-track" aria-hidden="true"><span id="progressFill"></span></div>
          <button id="backButton" class="back-button" type="button">戻る</button>
        </div>
        <div id="visual" class="question-visual" aria-hidden="true"></div>
        <h2 id="questionText"></h2>
        <div id="answers" class="answers"></div>
      </div>

      <div id="resultView" class="result-view hidden">
        <p class="eyebrow">診断結果</p>
        <h2 id="resultTitle"></h2>
        <div class="score-ring" aria-label="推定IQ">
          <span id="iqScore">100</span>
          <small>推定IQ</small>
        </div>
        <p id="resultCopy"></p>
        <div class="share-row">
          <button id="nativeShare" class="primary-button" type="button">SNSでシェア</button>
          <a id="xShare" class="share-link" target="_blank" rel="noreferrer">Xで共有</a>
          <a id="lineShare" class="share-link" target="_blank" rel="noreferrer">LINEで送る</a>
        </div>
        <button id="retryButton" class="ghost-button" type="button">もう一度診断する</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
